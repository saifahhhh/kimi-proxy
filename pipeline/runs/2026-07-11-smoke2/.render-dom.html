<!DOCTYPE html>
<html lang="th"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My App — เข้าสู่ระบบ</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { min-height: 100vh; display: grid; place-items: center;
         background: linear-gradient(160deg, #0f1117, #1a1f2b);
         color: #e6e8ee; font-family: -apple-system, 'Segoe UI', sans-serif; }
  .card { width: 400px; max-width: 92vw; background: #161a24; padding: 32px;
          border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.45); }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  .muted { color: #9aa3b2; font-size: 13px; margin-bottom: 24px; }
  label { display: block; font-size: 15px; margin-bottom: 16px; }
  input { display: block; width: 100%; height: 44px; margin-top: 8px;
          padding: 0 12px; border-radius: 10px; border: 1px solid #2a3245;
          background: #0f1117; color: #e6e8ee; font-size: 15px; }
  input:focus { outline: none; border-color: #2f6fed; }
  input.bad { border-color: #ff6b6b; }
  .error { color: #ff6b6b; font-size: 13px; margin-top: 4px; display: none; }
  button { width: 100%; height: 46px; border: 0; border-radius: 10px;
           background: #2f6fed; color: white; font-size: 15px; font-weight: 600;
           cursor: pointer; margin-top: 8px; }
  button:hover { filter: brightness(1.08); }
  button:disabled { opacity: .6; cursor: wait; }
  a { display: block; text-align: center; margin-top: 16px; color: #9aa3b2;
      font-size: 13px; }
  .success { display: none; text-align: center; color: #51cf66; padding: 24px 0; }
</style>
</head>
<body>
<main class="card">
  <h1>My App</h1>
  <p class="muted">เข้าสู่ระบบเพื่อใช้งานต่อ</p>
  <form id="login" novalidate="">
    <label>อีเมล
      <input id="email" type="email" required="">
      <span class="error" id="email-error">รูปแบบอีเมลไม่ถูกต้อง</span>
    </label>
    <label>รหัสผ่าน
      <input id="pw" type="password" required="" minlength="8">
      <span class="error" id="pw-error">รหัสผ่านต้องยาวอย่างน้อย 8 ตัว</span>
    </label>
    <button type="submit" id="btn">เข้าสู่ระบบ</button>
    <a href="#">ลืมรหัสผ่าน?</a>
  </form>
  <div class="success" id="ok">✓ เข้าสู่ระบบสำเร็จ</div>
</main>
<script>
  const form = document.getElementById('login');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email');
    const pw = document.getElementById('pw');
    let bad = false;
    const flag = (el, errId, cond) => {
      el.classList.toggle('bad', cond);
      document.getElementById(errId).style.display = cond ? 'block' : 'none';
      if (cond) bad = true;
    };
    flag(email, 'email-error', !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email.value));
    flag(pw, 'pw-error', pw.value.length < 8);
    if (bad) return;
    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'กำลังเข้าสู่ระบบ...';
    setTimeout(() => {
      form.style.display = 'none';
      document.getElementById('ok').style.display = 'block';
    }, 1000);
  });
</script>


</body></html>
